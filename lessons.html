<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whip Lessons</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: #111;
    color: white;
  }

  nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
  }

  .page-title {
    text-align: center;
    padding: 50px 20px 10px;
    font-size: 42px;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
  }

  .lesson-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
  }

  .lesson-card:hover {
    transform: translateY(-6px);
  }

  .lesson-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }

  .lesson-card h3 {
    padding: 12px;
    font-size: 18px;
  }

  /* MODAL */
  .video-box {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .video-content {
    position: relative;
    width: 90%;
    max-width: 750px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 24px;
    color: white;
    cursor: pointer;
    z-index: 2;
  }
</style>
</head>

<body>

<header>
  <div class="logo">Whip</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Lessons</a>
  </nav>
</header>

<h1 class="page-title">Lessons</h1>

<div class="lesson-grid">

  <div class="lesson-card"
       data-video="LbMzStHsw3w"
       data-title="Smells Like Teen Spirit - Nirvana">
    <img src="https://upload.wikimedia.org/wikipedia/en/b/b7/NirvanaNevermindalbumcover.jpg">
    <h3>Smells Like Teen Spirit</h3>
  </div>

  <div class="lesson-card"
       data-video="o8wM8inaqmo"
       data-title="Wonderwall - Oasis Guitar Tutorial">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/0d/Oasis_-_(What%27s_The_Story)_Morning_Glory_album_cover.jpg">
    <h3>Wonderwall</h3>
  </div>

  <div class="lesson-card"
       data-video="dQw4w9WgXcQ"
       data-title="Basic Chord Practice">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Guitar_1.jpg/640px-Guitar_1.jpg">
    <h3>Basic Chords</h3>
  </div>

</div>

<!-- SINGLE REUSABLE MODAL -->
<div id="videoBox" class="video-box">

  <div class="video-content">

    <span class="close" onclick="closeVideo()">✖</span>

    <iframe id="videoFrame" src="" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

  </div>
</div>

<script>
const cards = document.querySelectorAll(".lesson-card");
const modal = document.getElementById("videoBox");
const frame = document.getElementById("videoFrame");

cards.forEach(card => {
  card.addEventListener("click", () => {
    const videoId = card.getAttribute("data-video");

    frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    modal.style.display = "flex";
  });
});

function closeVideo() {
  modal.style.display = "none";
  frame.src = ""; // stops video
}
</script>

</body>
</html>
