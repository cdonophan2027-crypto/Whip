<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whip Lessons</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: #111;
    color: white;
  }

  nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
  }

  .page-title {
    text-align: center;
    padding: 60px 20px 20px;
    font-size: 42px;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 50px;
  }

  .lesson-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
  }

  .lesson-card:hover {
    transform: translateY(-8px);
  }

  .lesson-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }

  .lesson-card h3 {
    padding: 15px;
    font-size: 20px;
  }

  /* VIDEO POPUP */
  .video-box {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .video-content {
    position: relative;
    width: 80%;
    max-width: 800px;
    background: #000;
    padding: 20px;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }
</style>
</head>

<body>

<header>
  <div class="logo">Whip</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="lessons.html">Lessons</a>
  </nav>
</header>

<h1 class="page-title">Lessons</h1>

<div class="lesson-grid">

  <div class="lesson-card" onclick="openVideo()">
    <img src="https://upload.wikimedia.org/wikipedia/en/b/b7/NirvanaNevermindalbumcover.jpg"
         alt="Nirvana Nevermind Album">

    <h3>Smells Like Teen Spirit - Guitar Tutorial</h3>
  </div>

</div>

<!-- VIDEO POPUP -->
<div id="videoBox" class="video-box">
  <div class="video-content">

    <span class="close" onclick="closeVideo()">✖</span>

    <iframe
      width="100%"
      height="400"
      src="https://www.youtube.com/embed/hTWKbfoikeg"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

  </div>
</div>

<script>
function openVideo() {
  document.getElementById("videoBox").style.display = "flex";
}

function closeVideo() {
  document.getElementById("videoBox").style.display = "none";
}
</script>

</body>
</html>
