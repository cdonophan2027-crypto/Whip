<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons - Whip</title>

  <link rel="stylesheet" href="style.css">

  <style>
    .page-title {
      text-align: center;
      padding: 60px 20px 20px;
      font-size: 42px;
    }

    .video-box {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.video-content {
  position: relative;
  width: 80%;
  max-width: 800px;
  background: #000;
  padding: 20px;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  color: white;
  font-size: 24px;
  cursor: pointer;
}
  </style>
</head>

<body>

  <header>
    <div class="logo">Whip</div>

    <nav>
      <a href="index.html">Home</a>
      <a href="lessons.html">Lessons</a>
    </nav>
  </header>

  <h1 class="page-title">Lessons</h1>

  <div class="lesson-card" onclick="openVideo()">

  <img src="https://upload.wikimedia.org/wikipedia/en/b/b7/NirvanaNevermindalbumcover.jpg"
       alt="Nirvana Nevermind Album">

  <h3>Smells Like Teen Spirit - Guitar Tutorial</h3>

</div>

<!-- Hidden video player -->
<div id="videoBox" class="video-box">
  <div class="video-content">

    <span class="close" onclick="closeVideo()">✖</span>

    <iframe
      width="100%"
      height="400"
      src="https://www.youtube.com/embed/hTWKbfoikeg"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

  </section>

</body>

<script>
function openVideo() {
  document.getElementById("videoBox").style.display = "flex";
}

function closeVideo() {
  document.getElementById("videoBox").style.display = "none";
}
</script>

    
</html>
